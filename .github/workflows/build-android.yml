name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libltdl-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          cmake \
          unzip \
          zip

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    - name: Download Android SDK tools
      run: |
        BUILDOZER_SDK=".buildozer/android/platform/android-sdk"
        # Only download if not already cached
        if [ ! -d "$BUILDOZER_SDK/tools" ]; then
          mkdir -p "$BUILDOZER_SDK"
          curl -fsSL -o /tmp/cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
          # buildozer expects SDK tools at: $SDK/tools/bin/sdkmanager
          mkdir -p "$BUILDOZER_SDK/tools"
          cp -r /tmp/cmdline-tools-tmp/cmdline-tools/* "$BUILDOZER_SDK/tools/"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-tmp
        fi

    - name: Accept Android SDK licenses
      run: |
        BUILDOZER_SDK=".buildozer/android/platform/android-sdk"
        # Write license hash files
        mkdir -p "$BUILDOZER_SDK/licenses"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$BUILDOZER_SDK/licenses/android-sdk-license"
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> "$BUILDOZER_SDK/licenses/android-sdk-preview-license"
        echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> "$BUILDOZER_SDK/licenses/android-sdk-arm-dbt-license"
        # Accept interactively via sdkmanager
        yes | "$BUILDOZER_SDK/tools/bin/sdkmanager" --sdk_root="$BUILDOZER_SDK" --licenses 2>/dev/null || true

    - name: Build APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: guidevision-debug
        path: bin/*.apk
